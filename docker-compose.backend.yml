version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dinoquest-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/dinoquest.db
    volumes:
      - dinoquest_data:/app/data
    ports:
      - "8122:8122"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8122"

volumes:
  dinoquest_data:
